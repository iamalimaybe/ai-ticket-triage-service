spring.application.name=ai-ticket-triage-service

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/ticket_triage}
spring.datasource.username=${DB_USERNAME:ticket_triage}
spring.datasource.password=${DB_PASSWORD:ticket_triage}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.liquibase.change-log=classpath:db/db.changelog-master.xml

ticket.triage.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ticket.triage.ollama.model=${OLLAMA_MODEL:qwen3:4b}

ticket.triage.analyzer.mode=${TICKET_TRIAGE_ANALYZER_MODE:deterministic}

ticket.triage.review.confidence-threshold=${TICKET_TRIAGE_REVIEW_CONFIDENCE_THRESHOLD:0.70}