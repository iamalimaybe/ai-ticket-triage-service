spring.application.name=ai-ticket-triage-service

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/ticket_triage}
spring.datasource.username=${DB_USERNAME:ticket_triage}
spring.datasource.password=${DB_PASSWORD:ticket_triage}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.liquibase.change-log=classpath:db/db.changelog-master.xml
